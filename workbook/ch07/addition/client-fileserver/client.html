<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicroPython File Server Client</title>

<style>
body {
    font-family: sans-serif;
    margin: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.header {
    margin-bottom: 20px;
}

.connection-form {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input {
    padding: 5px;
}

button {
    padding: 6px 10px;
    cursor: pointer;
}

.section {
    margin-bottom: 30px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.stat-card {
    border: 1px solid #ccc;
    padding: 10px;
}

.file-list {
    list-style: none;
    padding: 0;
}

.file-item {
    display: flex;
    justify-content: space-between;
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 5px;
}

.file-actions {
    display: flex;
    gap: 10px;
}

.upload-area {
    border: 1px dashed #aaa;
    padding: 20px;
    text-align: center;
    cursor: pointer;
}

.upload-area.dragover {
    background: #eee;
}

.log {
    background: #111;
    color: #ddd;
    padding: 10px;
    max-height: 250px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 12px;
}

.progress-bar {
    width: 100%;
    height: 4px;
    background: #ddd;
    margin-top: 10px;
}

.progress-fill {
    height: 100%;
    width: 0%;
    background: #444;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>MicroPython File Server</h1>
<p>File Management Interface</p>
</div>

<div class="connection-form">
<input type="text" id="serverHost" placeholder="Server IP" value="192.168.1.100">
<input type="number" id="serverPort" placeholder="Port" value="8080">
<button onclick="connect()">Connect</button>
<button onclick="refreshAll()">Refresh All</button>
<span>Status: <span id="connectionStatus">Disconnected</span></span>
<span id="statusIndicator"></span>
</div>

<div class="section">
<h2>Server Statistics</h2>

<div class="stats-grid">

<div class="stat-card">
<div>Total Files</div>
<div id="statFiles">-</div>
</div>

<div class="stat-card">
<div>Used Space</div>
<div id="statUsed">-</div>
</div>

<div class="stat-card">
<div>Free Space</div>
<div id="statFree">-</div>
</div>

<div class="stat-card">
<div>Total Space</div>
<div id="statTotal">-</div>
</div>

</div>
</div>

<div class="section">
<h2>Upload Files</h2>

<div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
<p>Drop files here or click to browse</p>
<input type="file" id="fileInput" multiple style="display:none;" onchange="handleFileSelect(event)">
</div>

<div class="progress-bar" id="uploadProgress" style="display:none;">
<div class="progress-fill" id="uploadProgressFill"></div>
</div>

</div>

<div class="section">
<h2>Files on SD Card</h2>

<ul class="file-list" id="fileList">
<li>No files loaded. Click "Refresh All".</li>
</ul>

</div>

<div class="section">
<h2>Activity Log</h2>
<div class="log" id="logArea"></div>
</div>

</div>

<script>

/* ALL ORIGINAL JAVASCRIPT FUNCTIONS LEFT UNTOUCHED */

let serverHost = '192.168.1.100';
let serverPort = 8080;
let serverUrl = '';

// Logging
function log(message, type = 'info') {
    const logArea = document.getElementById('logArea');
    const timestamp = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.textContent = `[${timestamp}] ${message}`;
    logArea.appendChild(entry);
    logArea.scrollTop = logArea.scrollHeight;
}

// Connection
function connect() {
    serverHost = document.getElementById('serverHost').value;
    serverPort = document.getElementById('serverPort').value;
    serverUrl = `http://${serverHost}:${serverPort}`;

    log(`Attempting to connect to ${serverUrl}...`, 'info');

    fetchStats().then(() => {
        document.getElementById('connectionStatus').textContent = 'Connected';
        document.getElementById('statusIndicator').className = 'status-indicator connected';
        log('Connected successfully!', 'success');
        refreshAll();
    }).catch(err => {
        document.getElementById('connectionStatus').textContent = 'Disconnected';
        document.getElementById('statusIndicator').className = 'status-indicator disconnected';
        log(`Connection failed: ${err.message}`, 'error');
    });
}

// Fetch statistics
async function fetchStats() {
    const response = await fetch(`${serverUrl}/stats`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const stats = await response.json();

    document.getElementById('statFiles').textContent = stats.files;
    document.getElementById('statUsed').textContent = formatBytes(stats.used_by_vfs);
    document.getElementById('statFree').textContent = formatBytes(stats.free_space);
    document.getElementById('statTotal').textContent = formatBytes(stats.total_space);

    log(`Stats updated: ${stats.files} files, ${formatBytes(stats.used_by_vfs)} used`, 'success');

    return stats;
}

// Fetch file list
async function fetchFileList() {
    const response = await fetch(`${serverUrl}/`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const files = await response.json();

    const fileList = document.getElementById('fileList');
    fileList.innerHTML = '';

    if (files.length === 0) {
        fileList.innerHTML = '<li>No files on SD card</li>';
    } else {
        files.forEach(file => {
            const li = document.createElement('li');
            li.className = 'file-item';
            li.innerHTML = `
                <div class="file-info">
                    <div>${file.name}</div>
                    <div>
                        Size: ${formatBytes(file.size)} |
                        Created: ${formatTimestamp(file.created)} |
                        Modified: ${formatTimestamp(file.modified)}
                    </div>
                </div>
                <div class="file-actions">
                    <button onclick="downloadFile('${file.name}')">Download</button>
                    <button onclick="deleteFile('${file.name}')">Delete</button>
                </div>
            `;
            fileList.appendChild(li);
        });
    }

    log(`File list updated: ${files.length} files`, 'success');
}

// Upload file
async function uploadFile(file) {

    log(`Uploading ${file.name} (${formatBytes(file.size)})...`, 'info');

    const progressBar = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('uploadProgressFill');
    progressBar.style.display = 'block';
    progressFill.style.width = '0%';

    try {

        const fileData = await file.arrayBuffer();

        const response = await fetch(`${serverUrl}/file/${encodeURIComponent(file.name)}`, {
            method: 'PUT',
            body: fileData,
            headers: {
                'Content-Type': 'application/octet-stream'
            }
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || `HTTP ${response.status}`);
        }

        progressFill.style.width = '100%';

        log(`Uploaded ${file.name} successfully`, 'success');

        setTimeout(() => {
            progressBar.style.display = 'none';
        }, 1000);

        await fetchFileList();
        await fetchStats();

    } catch (err) {
        log(`Upload failed: ${err.message}`, 'error');
        progressBar.style.display = 'none';
    }

}

// Download file
async function downloadFile(filename) {

    log(`Downloading ${filename}...`, 'info');

    try {

        const response = await fetch(`${serverUrl}/file/${encodeURIComponent(filename)}`);

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const blob = await response.blob();

        const url = window.URL.createObjectURL(blob);

        const a = document.createElement('a');

        a.href = url;
        a.download = filename;

        document.body.appendChild(a);

        a.click();

        window.URL.revokeObjectURL(url);

        document.body.removeChild(a);

        log(`Downloaded ${filename}`, 'success');

    } catch (err) {

        log(`Download failed: ${err.message}`, 'error');

    }

}

// Delete file
async function deleteFile(filename) {

    if (!confirm(`Are you sure you want to delete "${filename}"?`)) return;

    log(`Deleting ${filename}...`, 'info');

    try {

        const response = await fetch(`${serverUrl}/file/${encodeURIComponent(filename)}`, {
            method: 'DELETE'
        });

        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || `HTTP ${response.status}`);
        }

        log(`Deleted ${filename}`, 'success');

        await fetchFileList();
        await fetchStats();

    } catch (err) {

        log(`Delete failed: ${err.message}`, 'error');

    }

}

// Refresh all
async function refreshAll() {

    try {
        await fetchStats();
        await fetchFileList();
    } catch (err) {
        log(`Refresh failed: ${err.message}`, 'error');
    }

}

// File input handler
function handleFileSelect(event) {

    const files = event.target.files;

    for (let file of files) {
        uploadFile(file);
    }

    event.target.value = '';

}

// Drag and drop
const uploadArea = document.getElementById('uploadArea');

uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', (e) => {

    e.preventDefault();

    uploadArea.classList.remove('dragover');

    const files = e.dataTransfer.files;

    for (let file of files) {
        uploadFile(file);
    }

});

// Utilities
function formatBytes(bytes) {

    if (bytes === 0) return '0 B';

    const k = 1024;

    const sizes = ['B', 'KB', 'MB', 'GB'];

    const i = Math.floor(Math.log(bytes) / Math.log(k));

    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];

}

function formatTimestamp(timestamp) {

    if (!timestamp) return 'N/A';

    const date = new Date(timestamp * 1000);

    return date.toLocaleString();

}

log('File Server Client initialized', 'info');
log('Enter server IP and port, then click Connect', 'info');

</script>

</body>
</html>
